<!DOCTYPE html>
<html lang="tr">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>🫏 Ben bir eşeğim</title>

    <link rel="stylesheet" href="style.css">

</head>
<body>

    <!-- Arxa fon -->
    <div id="background"></div>

    <!-- Mərkəzdəki hissə -->
    <div class="container">

        <h1 id="title">
            🫏 Ben bir eşeğim 🫏
        </h1>

        <h2 id="question">
            Barışalım mı?
        </h2>

        <div class="buttons">

            <button id="yesBtn">
                Evet ❤️
            </button>

            <button id="noBtn">
                Hayır
            </button>

        </div>

    </div>

    <!-- Easter Egg -->
    <div id="secret">
        Seni Çok Ama Çok Ama Çok Ama Çok Seviyorum Ezgi ❤️
    </div>

    <script src="script.js"></script>

</body>
</html>
